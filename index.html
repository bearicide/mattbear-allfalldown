<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MATTBEAR — All Fall Down</title>
<meta name="theme-color" content="#101713" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Poiret+One&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg0:#0a0f0c;
--bg1:#101713;
--bg2:#161b18;
--ink:#dfe7dd;
--muted:#95a193;
--pine:#1F5E47;
--mbv:#4B2C63;
--gold:#C7B15A;
--line:rgba(95,164,129,.18);
--panel:rgba(10,15,12,.72);
--radius:28px;
}
*{box-sizing:border-box}
html{background:#0a0f0c}
body{
margin:0;
color:var(--ink);
font-family:Inter,system-ui;
background:
radial-gradient(1200px 800px at 15% 0%,rgba(31,94,71,.24),transparent 60%),
radial-gradient(1000px 700px at 90% 10%,rgba(75,44,99,.22),transparent 60%),
linear-gradient(160deg,var(--bg0),var(--bg1) 55%,var(--bg2));
min-height:100vh;
overflow-x:hidden;
}
body:before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:linear-gradient(rgba(255,255,255,.02),rgba(255,255,255,0));
opacity:.18;
mix-blend-mode:screen;
}
.layout{display:flex;min-height:100vh}
.sidebar{
width:240px;
padding:40px 20px;
border-right:1px solid var(--line);
background:rgba(0,0,0,.22);
backdrop-filter:blur(8px);
}
.brand{
font-family:Cinzel,Georgia,serif;
font-weight:800;
letter-spacing:.28em;
text-transform:uppercase;
font-size:20px;
margin-bottom:40px;
color:#eef7ef;
text-shadow:0 0 18px rgba(56,217,150,.18);
}
.nav{display:flex;flex-direction:column;gap:18px}
.nav a,footer a{
text-decoration:none;
color:var(--ink);
font-size:13px;
letter-spacing:.18em;
text-transform:uppercase;
padding:10px 12px;
border-radius:14px;
border:1px solid rgba(95,164,129,.16);
background:rgba(12,18,15,.45);
transition:.22s ease;
}
.nav a:hover,footer a:hover{
background:rgba(31,94,71,.22);
border-color:rgba(199,177,90,.28);
transform:translateY(-1px);
}
.content{flex:1;padding:60px 60px 80px}
header{margin-bottom:40px}
.title{
font-family:Cinzel,Georgia,serif;
font-size:clamp(38px,4vw,64px);
letter-spacing:.24em;
text-transform:uppercase;
text-shadow:0 0 28px rgba(75,44,99,.25);
}
.subtitle{
margin-top:16px;
font-family:Poiret One,Cinzel,serif;
font-size:14px;
letter-spacing:.25em;
text-transform:uppercase;
color:var(--gold);
opacity:.92;
}
.card{
border-radius:var(--radius);
border:1px solid var(--line);
background:var(--panel);
padding:28px;
box-shadow:0 24px 70px rgba(0,0,0,.32);
backdrop-filter:blur(10px);
}
.embed{
border-radius:22px;
overflow:hidden;
border:1px solid rgba(95,164,129,.18);
background:#080b09;
}
.embed iframe{
display:block;
width:100%;
height:640px;
border:0;
filter:saturate(.92) contrast(1.02);
}
footer{
margin-top:40px;
font-size:12px;
color:var(--muted);
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
letter-spacing:.08em;
}
@media(max-width:900px){
.layout{flex-direction:column}
.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid var(--line);
display:flex;
justify-content:space-between;
align-items:center;
padding:24px 18px;
}
.nav{flex-direction:row;flex-wrap:wrap}
.content{padding:40px 20px}
.embed iframe{height:560px}
}
@media(max-width:560px){
.sidebar{display:block}
.brand{margin-bottom:20px}
.content{padding:28px 14px}
.card{padding:14px;border-radius:20px}
.embed iframe{height:520px}
.title{letter-spacing:.12em;line-height:1.1}
.subtitle{letter-spacing:.18em}
.nav a,footer a{font-size:11px;padding:9px 10px}
}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<div class="brand">MATTBEAR</div>
<div class="nav">
<a href="index.html">Home</a>
<a href="mattbear-gold-slot.html">Gold Slot 5×5</a>
<a href="https://bearicide.github.io/" target="_blank" rel="noopener">Main Portal</a>

<a href="https://suno.com/@mattbear86" target="_blank" rel="noopener">Suno</a>
</div>
</div>
<div class="content">
<header>
<div class="title">All Fall Down</div>
<div class="subtitle">Entropy Pine // MBV Transmission</div>
</header>
<div class="card">
<div class="embed">
<iframe title="MATTBEAR All Fall Down SoundCloud playlist" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/mattbear86/sets/allfalldown&color=%231F5E47&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe>
</div>
</div>
<footer>
<span>© MATTBEAR — Atmospheric Remaster Pass</span>
<a href="https://bearicide.github.io/">Main Portal</a>
<a href="https://bearicide.github.io/wordplay/">WORDPLAY</a>
</footer>
</div>
</div>
</body>
</html>
